models:
  - type: main
    engine: ollama
    model: llama3.1:8b 
    parameters:
      base_url: "http://localhost:11434"

rails:
  config:
    # 1. On désactive complètement le moteur de dialogue LLM
    # Cela évite que NeMo n'essaie de répondre à la place de ton RAG
    dialog:
      enabled: false 
    
    # 2. Configuration de GLiNER
    # Assure-toi que ton serveur GLiNER tourne sur le port 1235
    gliner:
      server_endpoint: "http://localhost:1235/v1/extract"
      threshold: 0.5
      # Entités que GLiNER doit chercher
      input:
        entities: ["email", "phone_number", "first_name", "last_name", "address"]
      output:
        entities: ["email", "phone_number", "first_name", "last_name", "address"]

